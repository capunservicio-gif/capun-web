<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAPUN - Panel Maestro</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Estilos Panel Maestro */
        .teacher-grid { display: grid; grid-template-columns: 300px 1fr; gap: 20px; }
        .student-list { background: white; padding: 20px; border-radius: 10px; height: fit-content; min-height: 400px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .student-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; transition: 0.2s; display: flex; justify-content: space-between; align-items: center; }
        .student-item:hover { background: #f0f9ff; color: #4a90e2; padding-left: 20px;}
        
        .editor-panel { background: white; padding: 30px; border-radius: 10px; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        /* Estilos Boleta */
        .boleta-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: #f8f9fa; padding: 15px; border-radius: 10px; border: 1px solid #eee; }
        .month-selector { padding: 8px; border-radius: 5px; border: 1px solid #ddd; font-weight: bold; color: #2c3e50; }
        
        .boleta-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        .boleta-table th, .boleta-table td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        .boleta-table th { background: #2c3e50; color: white; }
        .boleta-table tr:nth-child(even) { background-color: #f9f9f9; }
        
        .grade-select { width: 100%; padding: 5px; border-radius: 5px; border: 1px solid #ccc; text-align: center; font-weight: bold; }
        
        .attendance-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; background: #fff3e0; padding: 15px; border-radius: 8px; border: 1px solid #ffe0b2; }
        .stat-box label { display: block; font-size: 0.8rem; font-weight: bold; color: #e67e22; }
        .stat-box input { width: 100%; padding: 5px; border: 1px solid #f39c12; border-radius: 5px; text-align: center; }

        .btn-save { background: #2ecc71; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; transition: 0.3s;}
        .btn-save:hover { background: #27ae60; }
        
        .legend { font-size: 0.8rem; color: #7f8c8d; margin-top: 5px; font-style: italic; }
    </style>
</head>
<body>
    <nav class="navbar" style="background: #2c3e50;"> 
        <div class="logo">
            <h1 style="color: white;"><i class="fas fa-chalkboard-teacher"></i> CAPUN Maestro</h1>
        </div>
        <div class="nav-links">
            <a href="#" onclick="cerrarSesion()" style="color: white; margin-left: 15px;">Salir</a>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="teacher-grid">
            <div class="student-list">
                <h3><i class="fas fa-users"></i> Mis Alumnos</h3>
                <div id="students-container"><p>Cargando lista...</p></div>
            </div>

            <div class="editor-panel" id="editor-panel">
                
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <h2 id="edit-student-name" style="color: #2c3e50;">Selecciona un alumno</h2>
                </div>

                <div class="boleta-header">
                    <label>📅 Llenar Boleta del Mes:</label>
                    <select id="select-month" class="month-selector" onchange="cargarBoletaDelMes()">
                        <option value="ago">Agosto</option>
                        <option value="sept">Septiembre</option>
                        <option value="oct">Octubre</option>
                        <option value="nov">Noviembre</option>
                        <option value="dic">Diciembre</option>
                        <option value="ene">Enero</option>
                        <option value="feb">Febrero</option>
                        <option value="mar">Marzo</option>
                        <option value="abr">Abril</option>
                        <option value="may">Mayo</option>
                        <option value="jun">Junio</option>
                    </select>
                </div>

                <table class="boleta-table">
                    <thead>
                        <tr>
                            <th>Asignatura</th>
                            <th width="120">Calificación</th>
                        </tr>
                    </thead>
                    <tbody id="grades-body">
                        </tbody>
                </table>
                <div class="legend">E: Excelente | MB: Muy Bien | B: Bien | R: Regular | *: Con Ayuda</div>

                <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

                <h4 style="color:#e67e22; margin-bottom:10px;"><i class="fas fa-clock"></i> Resumen de Asistencia Mensual</h4>
                <div class="attendance-grid">
                    <div class="stat-box">
                        <label>Asistencias</label>
                        <input type="number" id="stat-asistencias" value="0">
                    </div>
                    <div class="stat-box">
                        <label>Inasistencias</label>
                        <input type="number" id="stat-inasistencias" value="0">
                    </div>
                    <div class="stat-box">
                        <label>Justificadas</label>
                        <input type="number" id="stat-justificadas" value="0">
                    </div>
                    <div class="stat-box">
                        <label>Retardos</label>
                        <input type="number" id="stat-retardos" value="0">
                    </div>
                </div>

                <div style="margin-top: 20px;">
                    <label style="font-weight:bold;">🏆 Agregar Logro Destacado:</label>
                    <div style="display:flex; gap:10px; margin-top:5px;">
                        <input id="new-achievement" style="flex:1; padding:8px; border:1px solid #ddd; border-radius:5px;" placeholder="Ej: Aprendió a atarse las agujetas">
                        <button onclick="guardarLogro()" style="background:#3498db; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">Agregar</button>
                    </div>
                    <div id="achievements-history" style="margin-top:5px; font-size:0.85rem; color:#777;"></div>
                </div>

                <button onclick="guardarBoleta()" class="btn-save"><i class="fas fa-save"></i> GUARDAR CAMBIOS DEL MES</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://capun-api.onrender.com/api'; // CAMBIA A TU URL DE RENDER
        let currentStudent = null;

        const subjectsList = [
            "Funciones Cognitivas y Ejecutivas", "Desarrollo de Independencia", "Lenguaje",
            "Matemáticas", "Psicomotricidad", "Habilidades Sociales",
            "Lectura y Escritura", "Arte", "Educación Física", "Música"
        ];

        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            if(!token) window.location.href = 'login.html';
            cargarListaAlumnos();
        });

        async function cargarListaAlumnos() {
            const token = localStorage.getItem('token');
            const res = await fetch(`${API_URL}/teacher/students`, { headers: { 'Authorization': token } });
            const students = await res.json();
            const container = document.getElementById('students-container');
            container.innerHTML = '';
            
            // --- FILTRO ANTI-BASURA AQUI ---
            const alumnosReales = students.filter(st => {
                // Si el nombre no existe, es undefined o es cadena vacía, lo ignoramos
                return st.name && st.name !== 'undefined' && st.name.trim() !== '';
            });

            if (alumnosReales.length === 0) {
                container.innerHTML = '<p style="padding:10px; color:#777;">No hay alumnos registrados.</p>';
            }

            alumnosReales.forEach(st => {
                const div = document.createElement('div');
                div.className = 'student-item';
                div.innerHTML = `<b>${st.name}</b> <i class="fas fa-chevron-right"></i>`;
                div.onclick = () => seleccionarAlumno(st);
                container.appendChild(div);
            });
        }

        function seleccionarAlumno(st) {
            currentStudent = st;
            document.getElementById('editor-panel').style.display = 'block';
            document.getElementById('edit-student-name').innerText = st.name;
            
            renderHistorialLogros(st);
            
            const tbody = document.getElementById('grades-body');
            tbody.innerHTML = '';

            subjectsList.forEach(subject => {
                const row = `
                    <tr>
                        <td>${subject}</td>
                        <td>
                            <select class="grade-select" data-subject="${subject}">
                                <option value="">-</option>
                                <option value="E">E</option>
                                <option value="MB">MB</option>
                                <option value="B">B</option>
                                <option value="R">R</option>
                                <option value="*">*</option>
                            </select>
                        </td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });

            cargarBoletaDelMes();
        }

        function cargarBoletaDelMes() {
            if(!currentStudent) return;
            const month = document.getElementById('select-month').value;
            
            const boleta = currentStudent.boleta || {};
            const grades = (boleta.grades && boleta.grades[month]) ? boleta.grades[month] : {};
            const stats = (boleta.attendanceStats && boleta.attendanceStats[month]) ? boleta.attendanceStats[month] : {};

            const selects = document.querySelectorAll('.grade-select');
            selects.forEach(sel => {
                const subject = sel.getAttribute('data-subject');
                sel.value = grades[subject] || ""; 
            });

            document.getElementById('stat-asistencias').value = stats.asistencias || 0;
            document.getElementById('stat-inasistencias').value = stats.inasistencias || 0;
            document.getElementById('stat-justificadas').value = stats.justificadas || 0;
            document.getElementById('stat-retardos').value = stats.retardos || 0;
        }

        async function guardarBoleta() {
            if(!currentStudent) return;
            const month = document.getElementById('select-month').value;
            const token = localStorage.getItem('token');

            const gradesObj = {};
            document.querySelectorAll('.grade-select').forEach(sel => {
                if(sel.value) gradesObj[sel.getAttribute('data-subject')] = sel.value;
            });

            const statsObj = {
                asistencias: document.getElementById('stat-asistencias').value,
                inasistencias: document.getElementById('stat-inasistencias').value,
                justificadas: document.getElementById('stat-justificadas').value,
                retardos: document.getElementById('stat-retardos').value
            };

            try {
                const res = await fetch(`${API_URL}/teacher/students/${currentStudent._id}/boleta`, {
                    method: 'PUT',
                    headers: { 'Authorization': token, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        month: month,
                        grades: gradesObj,
                        attendanceStats: statsObj
                    })
                });

                if(res.ok) {
                    alert(`✅ Boleta de ${month.toUpperCase()} guardada.`);
                    const updatedData = await res.json();
                    currentStudent = updatedData.student; 
                } else {
                    alert("Error al guardar");
                }
            } catch (error) { alert("Error de conexión"); }
        }

        async function guardarLogro() {
            const title = document.getElementById('new-achievement').value;
            if(!title) return;
            const token = localStorage.getItem('token');
            await fetch(`${API_URL}/teacher/students/${currentStudent._id}/achievement`, {
                method: 'POST', headers: {'Authorization': token, 'Content-Type': 'application/json'},
                body: JSON.stringify({ title })
            });
            document.getElementById('new-achievement').value = '';
            const res = await fetch(`${API_URL}/teacher/students`, { headers: { 'Authorization': token } });
            const list = await res.json();
            currentStudent = list.find(s => s._id === currentStudent._id);
            renderHistorialLogros(currentStudent);
        }

        function renderHistorialLogros(st) {
            const div = document.getElementById('achievements-history');
            div.innerHTML = '';
            if(st.achievements) {
                st.achievements.slice().reverse().forEach(a => {
                    div.innerHTML += `<div>• ${a.title}</div>`;
                });
            }
        }
        
        function cerrarSesion() { localStorage.clear(); window.location.href = 'login.html'; }
    </script>
</body>
</html>
