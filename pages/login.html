<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAPUN - Acceso</title>
    <link rel="icon" href="../assets/logo_capun.jpg" type="image/jpeg">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    
    <div class="login-split-screen">
        <div class="login-image" style="background-image: url('../assets/12.jpg');">
            <div class="login-overlay">
                <h2>Bienvenido a CAPUN</h2>
                <p>Plataforma de seguimiento escolar integral.</p>
            </div>
        </div>

        <div class="login-form-container">
            <div class="login-box-clean">
                <div class="logo-circle">
                    <img src="../assets/logo_capun.jpg" alt="Logo" onerror="this.src='../assets/15.jpg'">
                </div>
                <h2>Iniciar Sesión</h2>
                <p class="text-muted">Ingresa tus credenciales para continuar</p>

                <form id="login-form">
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="Correo electrónico" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Contraseña" required>
                    </div>
                    
                    <button type="submit" class="btn-login-full">ENTRAR <i class="fas fa-arrow-right"></i></button>
                    
                    <div class="options">
                        <a href="forgot-password.html">¿Olvidaste tu contraseña?</a>
                    </div>
                </form>
                
                <div style="margin-top: 30px; text-align: center;">
                    <a href="../index.html" style="color: #95a5a6; text-decoration: none; font-size: 0.9rem;">
                        <i class="fas fa-arrow-left"></i> Volver al Inicio
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/login.js"></script>
</body>
</html>
