<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAPUN - Nueva Contraseña</title>
    <link rel="icon" href="../assets/logo_capun.jpg" type="image/jpeg">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Mismos estilos que forgot-password.html */
        .auth-container { min-height: calc(100vh - 200px); display: flex; align-items: center; justify-content: center; padding: 2rem; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .auth-card { background: white; padding: 3rem; border-radius: 15px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); width: 100%; max-width: 450px; }
        .auth-header { text-align: center; margin-bottom: 2rem; }
        .auth-header h2 { color: #333; margin-bottom: 0.5rem; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .form-group { margin-bottom: 1.5rem; }
        .form-control { width: 100%; padding: 12px 15px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; }
        .form-control:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.3s; }
        .btn-primary { background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%); color: white; }
        .btn-secondary { background: #f8f9fa; color: #333; border: 2px solid #e0e0e0; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .alert { padding: 12px 15px; border-radius: 8px; margin-bottom: 1.5rem; display: none; }
        .alert.show { display: block; animation: fadeIn 0.3s; }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        .password-strength {
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            margin-top: 5px;
            overflow: hidden;
        }
        
        .password-strength-bar {
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }
        
        .password-weak .password-strength-bar { background: #e74c3c; width: 33%; }
        .password-medium .password-strength-bar { background: #f39c12; width: 66%; }
        .password-strong .password-strength-bar { background: #2ecc71; width: 100%; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <img src="../assets/images/logo_capun.jpg" alt="CAPUN Logo">
            <h1>CAPUN</h1>
        </div>
        <div class="nav-links">
            <a href="../index.html"><i class="fas fa-home"></i> Inicio</a>
            <a href="login.html"><i class="fas fa-sign-in-alt"></i> Iniciar Sesión</a>
            <a href="register.html"><i class="fas fa-user-plus"></i> Registrarse</a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2><i class="fas fa-lock"></i> Nueva Contraseña</h2>
                <p>Crea una nueva contraseña para tu cuenta</p>
            </div>
            
            <div id="alert" class="alert"></div>
            
            <form id="resetForm">
                <input type="hidden" id="token" value="">
                
                <div class="form-group">
                    <label for="newPassword">Nueva Contraseña</label>
                    <input type="password" id="newPassword" class="form-control" 
                           placeholder="Mínimo 6 caracteres" required>
                    <div class="password-strength">
                        <div class="password-strength-bar"></div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">Confirmar Contraseña</label>
                    <input type="password" id="confirmPassword" class="form-control" 
                           placeholder="Repite la contraseña" required>
                </div>
                
                <button type="submit" class="btn btn-primary" id="submitBtn">
                    <i class="fas fa-save"></i>
                    <span>Guardar Nueva Contraseña</span>
                </button>
                
                <div style="margin-top: 1.5rem; text-align: center;">
                    <a href="login.html" class="btn btn-secondary">
                        <i class="fas fa-arrow-left"></i>
                        Volver al Login
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'https://capun-api.onrender.com/api';
        
        // Obtener token de la URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        if (!token) {
            document.getElementById('alert').className = 'alert alert-error show';
            document.getElementById('alert').textContent = 'Enlace inválido o expirado';
            document.getElementById('resetForm').style.display = 'none';
        } else {
            document.getElementById('token').value = token;
        }
        
        // Validar fortaleza de contraseña
        document.getElementById('newPassword').addEventListener('input', function() {
            const password = this.value;
            const strengthBar = document.querySelector('.password-strength-bar');
            const container = document.querySelector('.password-strength');
            
            container.className = 'password-strength';
            
            if (password.length === 0) {
                strengthBar.style.width = '0%';
                return;
            }
            
            let strength = 0;
            if (password.length >= 6) strength++;
            if (password.length >= 8) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;
            
            if (strength <= 2) {
                container.classList.add('password-weak');
            } else if (strength <= 4) {
                container.classList.add('password-medium');
            } else {
                container.classList.add('password-strong');
            }
        });
        
        // Enviar formulario
        document.getElementById('resetForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const token = document.getElementById('token').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn = document.getElementById('submitBtn');
            const alertDiv = document.getElementById('alert');
            
            // Validaciones
            if (newPassword.length < 6) {
                showAlert('La contraseña debe tener al menos 6 caracteres', 'error');
                return;
            }
            
            if (newPassword !== confirmPassword) {
                showAlert('Las contraseñas no coinciden', 'error');
                return;
            }
            
            // Mostrar loading
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Actualizando...';
            submitBtn.disabled = true;
            
            try {
                const response = await fetch(`${API_BASE_URL}/password/reset-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        token, 
                        newPassword 
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    showAlert('¡Contraseña actualizada correctamente! Redirigiendo...', 'success');
                    
                    // Redirigir al login después de 2 segundos
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                    
                } else {
                    showAlert(data.message || 'Error al actualizar la contraseña', 'error');
                }
                
            } catch (error) {
                console.error('Error:', error);
                showAlert('Error de conexión con el servidor', 'error');
            } finally {
                submitBtn.innerHTML = '<i class="fas fa-save"></i><span>Guardar Nueva Contraseña</span>';
                submitBtn.disabled = false;
            }
        });
        
        function showAlert(message, type) {
            const alertDiv = document.getElementById('alert');
            alertDiv.textContent = message;
            alertDiv.className = `alert alert-${type} show`;
        }
    </script>
</body>
</html>
