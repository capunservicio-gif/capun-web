<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAPUN - Recuperar Contraseña</title>
    <link rel="icon" href="../assets/logo_capun.jpg" type="image/jpeg">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Estilos específicos para esta pantalla */
        .recovery-container {
            min-height: calc(100vh - 100px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .recovery-card {
            background: white;
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .icon-box {
            background: #f0f2f5;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: #4a90e2;
            font-size: 2rem;
        }

        .contact-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            border: 2px dashed #4a90e2;
            margin: 20px 0;
        }

        .btn-back {
            display: inline-block;
            margin-top: 15px;
            text-decoration: none;
            color: #7f8c8d;
            font-weight: 500;
            transition: 0.2s;
        }
        .btn-back:hover { color: #4a90e2; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <img src="../assets/logo_capun.jpg" alt="CAPUN Logo" onerror="this.src='https://via.placeholder.com/50'">
            <h1>CAPUN</h1>
        </div>
        <div class="nav-links">
            <a href="../index.html"><i class="fas fa-home"></i> Inicio</a>
            <a href="login.html"><i class="fas fa-sign-in-alt"></i> Iniciar Sesión</a>
        </div>
    </nav>

    <div class="recovery-container">
        <div class="recovery-card">
            <div class="icon-box">
                <i class="fas fa-lock"></i>
            </div>
            
            <h2 style="color: #2c3e50; margin-bottom: 10px;">¿Olvidaste tu contraseña?</h2>
            <p style="color: #7f8c8d; font-size: 0.95rem;">
                Por motivos de seguridad, el restablecimiento de contraseñas se realiza directamente en la administración escolar.
            </p>

            <div class="contact-box">
                <p style="color: #4a90e2; font-weight: bold; margin-bottom: 5px;">
                    <i class="fas fa-phone-alt"></i> Contáctanos
                </p>
                <h2 style="color: #2c3e50; font-size: 1.6rem; letter-spacing: 1px; margin: 5px 0;">
                    +52 (662) 108-9019
                </h2>
                <small style="color: #95a5a6;">Horario: 8:00am - 3:00pm</small>
            </div>

            <a href="login.html" class="btn-primary" style="display: block; text-decoration: none; background: #4a90e2; color: white; padding: 12px; border-radius: 8px;">
                Volver a Iniciar Sesión
            </a>
        </div>
    </div>
</body>
</html>
