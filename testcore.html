<!DOCTYPE html>
<html>
<body>
    <h1>Test de CORS y Backend</h1>
    <button onclick="testAll()">Probar Todo</button>
    <div id="result"></div>
    
    <script>
        async function testAll() {
            const result = document.getElementById('result');
            result.innerHTML = '<p>Probando...</p>';
            
            const tests = [
                {url: 'https://capun-api.onrender.com/', name: 'Backend raíz'},
                {url: 'https://capun-api.onrender.com/health', name: 'Salud backend'},
                {url: 'https://capun-api.onrender.com/api/test-cors', name: 'Test CORS'},
                {url: 'https://capun-api.onrender.com/api/auth/register', name: 'Registro', method: 'POST', body: {name:'Test',email:'test'+Date.now()+'@test.com',password:'123456'}}
            ];
            
            let html = '';
            
            for (const test of tests) {
                try {
                    const options = {
                        method: test.method || 'GET',
                        headers: {'Content-Type': 'application/json'}
                    };
                    
                    if (test.body) {
                        options.body = JSON.stringify(test.body);
                    }
                    
                    const response = await fetch(test.url, options);
                    const data = await response.text();
                    
                    html += `
                        <div style="margin:10px;padding:10px;border:2px solid #4CAF50;border-radius:5px;">
                            <strong>✅ ${test.name}:</strong> Status ${response.status}<br>
                            <small>URL: ${test.url}</small><br>
                            <pre>${data}</pre>
                        </div>
                    `;
                } catch (error) {
                    html += `
                        <div style="margin:10px;padding:10px;border:2px solid #f44336;border-radius:5px;">
                            <strong>❌ ${test.name}:</strong> ${error.message}<br>
                            <small>URL: ${test.url}</small>
                        </div>
                    `;
                }
            }
            
            result.innerHTML = html;
        }
        
        // Auto-test
        window.onload = testAll;
    </script>
</body>
</html>
